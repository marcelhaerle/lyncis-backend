name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x' # Or up to latest if available
          go-version-file: 'go.mod' # Ensures to match the version in go.mod
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Run Tests
        # Testcontainers needs Docker, which is naturally available in ubuntu-latest
        run: go test -v ./...

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test # Ensure tests pass before building and pushing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only push on merge/push to main
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lyncis-backend:latest,${{ secrets.DOCKER_USERNAME }}/lyncis-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lyncis-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lyncis-backend:buildcache,mode=max
