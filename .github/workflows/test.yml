name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '>=1.21'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run tests
      # testcontainers-go requires Docker, which is pre-installed on ubuntu-latest runners
      run: go test -v ./...
