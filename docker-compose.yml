services:
  postgres:
    image: postgres:16-alpine
    container_name: lyncis-postgres
    environment:
      POSTGRES_USER: lyncis
      POSTGRES_PASSWORD: lyncis
      POSTGRES_DB: lyncis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyncis"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
